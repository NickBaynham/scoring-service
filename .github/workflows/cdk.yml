# AWS CDK synth (always) and optional deploy — only when explicitly triggered.
# For deploy/diff against AWS, provide the OIDC IAM role ARN when running the workflow.
name: CDK

on:
  workflow_dispatch:
    inputs:
      command:
        description: "cdk command to run (synth, diff, deploy, destroy)"
        required: true
        default: "synth"
        type: choice
        options:
          - synth
          - diff
          - deploy
          - destroy
      aws_region:
        description: "AWS region for CDK and configure-aws-credentials"
        required: false
        default: "us-east-1"
        type: string
      role_arn:
        description: "IAM role ARN for OIDC (GitHub→AWS). Leave empty to skip AWS login (e.g. synth without credentials)."
        required: false
        default: ""
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  cdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/cdk
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CDK CLI
        run: npm install -g aws-cdk@2

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt

      # Secrets cannot be used in `if:`; probe role input in shell (empty skips AWS login).
      - name: Expose whether AWS role is configured
        id: aws
        run: |
          if [ -n "${{ github.event.inputs.role_arn }}" ]; then
            echo "has_role=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_role=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: ${{ steps.aws.outputs.has_role == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ github.event.inputs.role_arn }}
          aws-region: ${{ github.event.inputs.aws_region != '' && github.event.inputs.aws_region || 'us-east-1' }}

      - name: CDK synth
        if: ${{ github.event.inputs.command == 'synth' }}
        run: |
          . .venv/bin/activate
          cdk synth

      - name: CDK diff
        if: ${{ github.event.inputs.command == 'diff' }}
        run: |
          . .venv/bin/activate
          cdk diff --all

      - name: CDK deploy (manual only)
        if: ${{ github.event.inputs.command == 'deploy' }}
        run: |
          . .venv/bin/activate
          cdk deploy --all --require-approval never

      - name: CDK destroy (manual only — dangerous)
        if: ${{ github.event.inputs.command == 'destroy' }}
        run: |
          . .venv/bin/activate
          cdk destroy --all --force
