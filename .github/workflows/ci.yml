# Continuous integration: lint, typecheck, and tests on every push and PR.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.11"
          cache: true

      - name: Install dependencies
        run: pdm install -G dev -G test -G lint

      - name: Ruff lint
        run: pdm run ruff check app tests

      - name: Ruff format (check)
        run: pdm run ruff format --check app tests

      - name: Mypy
        run: pdm run mypy app

      - name: Pytest
        run: pdm run pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
